version: '3.8'

name: aria

services:
  postgres:
    image: postgres:16-alpine
    container_name: resume-screener-postgres
    environment:
      POSTGRES_USER: aria
      POSTGRES_PASSWORD: aria_secret
      POSTGRES_DB: aria_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aria -d aria_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: resume-screener-ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    environment:
      # 3 parallel slots: Stage 1 (2 nodes) + one Stage 2 node fires before the other finishes.
      - OLLAMA_NUM_PARALLEL=3
      # Keep model loaded — eliminates cold-load latency.
      - OLLAMA_MAX_LOADED_MODELS=1
      # Flash Attention: fused O(n) attention kernel — 20-40% faster on long contexts.
      - OLLAMA_FLASH_ATTENTION=1
      # Quantise the KV cache to int8 — halves VRAM usage, allows higher OLLAMA_NUM_PARALLEL.
      - OLLAMA_KV_CACHE_TYPE=q8_0
      # Keep model always hot in RAM (-1 = never unload)
      - OLLAMA_KEEP_ALIVE=-1
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # On first run, exec into container and pull the model:
    #   ollama pull gemma4:31b
    # Production uses gemma4:31b-cloud (set via OLLAMA_MODEL env var).

  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: resume-screener-backend
    ports:
      - "8000:8000"
    environment:
      # Ollama Cloud (default): https://ollama.com — get API key from https://ollama.com/settings/keys
      # For local Ollama, set OLLAMA_BASE_URL=http://ollama:11434 in your .env file
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-https://ollama.com}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:?OLLAMA_API_KEY is required. Get it from https://ollama.com/settings/keys}
      # Using gemma4:31b-cloud - powerful multimodal model with strong reasoning
      # Excellent for video malpractice detection, resume analysis, and transcript evaluation
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:31b-cloud}
      # 500s recommended for gemma4:31b-cloud (faster than 480B models)
      - LLM_NARRATIVE_TIMEOUT=${LLM_NARRATIVE_TIMEOUT:-500}
      - DATABASE_URL=postgresql://aria:aria_secret@postgres:5432/aria_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-only-change-in-production}
      - ENVIRONMENT=development
      # Automatically skipped when using Ollama Cloud
      - OLLAMA_STARTUP_REQUIRED=${OLLAMA_STARTUP_REQUIRED:-1}
      - VOICE_AGENT_URL=http://voice-agent:8002
    depends_on:
      postgres:
        condition: service_healthy
      # Remove this depends_on when using Ollama Cloud only
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./app/frontend
    container_name: resume-screener-frontend
    ports:
      - "3000:8080"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: resume-screener-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Dev config proxies to host.docker.internal (local dev server)
      # Prod config (nginx.prod.conf) proxies to backend:8000 (Docker network)
      - ./app/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ─── Voice Screening Services ────────────────────────────────────────────────

  # LiveKit Server — WebRTC SFU + SIP trunking for voice calls.
  # Handles outbound PSTN calls via Twilio and inbound call routing.
  livekit:
    build:
      context: .
      dockerfile: app/voice_agent/Dockerfile.livekit
    image: revanth2245/resume-livekit:latest
    container_name: resume-screener-livekit
    command: >
      --config /etc/livekit.yaml
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-devsecret}
    ports:
      - "7880:7880"       # WebSocket
      - "7881:7881"       # ICE/TCP fallback
      - "7882:7882/udp"   # TURN
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Speech Service — Parakeet TDT (STT) + Kokoro 82M (TTS) + Silero VAD.
  # CPU-only inference (no GPU on VPS).
  speech-service:
    build:
      context: .
      dockerfile: app/speech_service/Dockerfile
    container_name: resume-screener-speech-service
    restart: unless-stopped

  # Voice Agent — FastAPI dispatch server + LiveKit conversation orchestration.
  # Receives /dispatch calls from backend scheduler, creates LiveKit rooms,
  # initiates SIP outbound calls via Twilio, and runs the screening conversation.
  voice-agent:
    build:
      context: .
      dockerfile: app/voice_agent/Dockerfile
    container_name: resume-screener-voice-agent
    environment:
      - SPEECH_SERVICE_URL=http://speech-service:8001
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-devsecret}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-https://ollama.com}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:31b-cloud}
      - ARIA_BACKEND_URL=http://backend:8000
      - SIP_TRUNK_ID=${SIP_TRUNK_ID:-twilio-aria}
      - SIP_OUTBOUND_NUMBER=${SIP_OUTBOUND_NUMBER:-+18722789563}
      - SIP_TERMINATION_ADDRESS=${SIP_TERMINATION_ADDRESS:-aria-staging.pstn.twilio.com}
      - SIP_AUTH_USERNAME=${SIP_AUTH_USERNAME:-aria-livekit}
      - SIP_AUTH_PASSWORD=${SIP_AUTH_PASSWORD:-}
      - SIP_FROM_HOST=${SIP_FROM_HOST:-aria-staging.pstn.twilio.com}
      - SIP_TRANSPORT=${SIP_TRANSPORT:-SIP_TRANSPORT_TCP}
      - AGENT_PORT=8002
    ports:
      - "8002:8002"
    depends_on:
      livekit:
        condition: service_healthy
      speech-service:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  ollama_data:
  postgres_data:
