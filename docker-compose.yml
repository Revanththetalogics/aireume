version: '3.8'

name: aria

services:
  postgres:
    image: postgres:16-alpine
    container_name: resume-screener-postgres
    environment:
      POSTGRES_USER: aria
      POSTGRES_PASSWORD: aria_secret
      POSTGRES_DB: aria_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aria -d aria_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: resume-screener-ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    environment:
      # 3 parallel slots: Stage 1 (2 nodes) + one Stage 2 node fires before the other finishes.
      - OLLAMA_NUM_PARALLEL=3
      # Keep qwen3.5:4b loaded — eliminates cold-load latency.
      - OLLAMA_MAX_LOADED_MODELS=1
      # Flash Attention: fused O(n) attention kernel — 20-40% faster on long contexts.
      - OLLAMA_FLASH_ATTENTION=1
      # Quantise the KV cache to int8 — halves VRAM usage, allows higher OLLAMA_NUM_PARALLEL.
      - OLLAMA_KV_CACHE_TYPE=q8_0
      # Keep model always hot in RAM (-1 = never unload)
      - OLLAMA_KEEP_ALIVE=-1
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # On first run, exec into container and pull the model:
    #   ollama pull qwen3.5:4b
    # Production also uses qwen3.5:4b (set via OLLAMA_MODEL env var).

  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: resume-screener-backend
    ports:
      - "8000:8000"
    environment:
      # Ollama Cloud (default): https://ollama.com — get API key from https://ollama.com/settings/keys
      # For local Ollama, set OLLAMA_BASE_URL=http://ollama:11434 in your .env file
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-https://ollama.com}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:?OLLAMA_API_KEY is required. Get it from https://ollama.com/settings/keys}
      # Using gemma4:31b-cloud - powerful multimodal model with strong reasoning
      # Excellent for video malpractice detection, resume analysis, and transcript evaluation
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:31b-cloud}
      - OLLAMA_FAST_MODEL=${OLLAMA_FAST_MODEL:-gemma4:31b-cloud}
      # 180s recommended for gemma4:31b-cloud (faster than 480B models)
      - LLM_NARRATIVE_TIMEOUT=${LLM_NARRATIVE_TIMEOUT:-180}
      - DATABASE_URL=postgresql://aria:aria_secret@postgres:5432/aria_db
      - JWT_SECRET_KEY=change-this-in-production-use-a-long-random-string
      - ENVIRONMENT=development
      # Automatically skipped when using Ollama Cloud
      - OLLAMA_STARTUP_REQUIRED=${OLLAMA_STARTUP_REQUIRED:-1}
    depends_on:
      postgres:
        condition: service_healthy
      # Remove this depends_on when using Ollama Cloud only
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./app/frontend
    container_name: resume-screener-frontend
    ports:
      - "3000:8080"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: resume-screener-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Use nginx.prod.conf for production/staging (backend:8000)
      # Use nginx.conf for local development (host.docker.internal:8000)
      - ./app/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  postgres_data:
