version: '3.8'

name: aria

services:
  postgres:
    image: postgres:16-alpine
    container_name: resume-screener-postgres
    environment:
      POSTGRES_USER: aria
      POSTGRES_PASSWORD: aria_secret
      POSTGRES_DB: aria_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aria -d aria_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: resume-screener-ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    environment:
      # 3 parallel slots: Stage 1 (2 nodes) + one Stage 2 node fires before the other finishes.
      - OLLAMA_NUM_PARALLEL=3
      # Keep both models (llama3 + llama3.2:3b) loaded simultaneously — eliminates cold-load latency.
      - OLLAMA_MAX_LOADED_MODELS=2
      # Flash Attention: fused O(n) attention kernel — 20-40% faster on long contexts.
      - OLLAMA_FLASH_ATTENTION=1
      # Quantise the KV cache to int8 — halves VRAM usage, allows higher OLLAMA_NUM_PARALLEL.
      - OLLAMA_KV_CACHE_TYPE=q8_0
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # On first run, exec into container and pull both models:
    #   ollama pull llama3.2:3b   (dev fast model)
    #   ollama pull llama3        (dev reasoning model)
    # Production uses gemma4:4b + gemma4:12b (set via OLLAMA_FAST_MODEL / OLLAMA_MODEL env vars).

  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: resume-screener-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      # Must match a pulled image inside the ollama container (see comments on ollama service).
      - OLLAMA_MODEL=llama3.2:3b
      - OLLAMA_FAST_MODEL=llama3.2:3b
      - LLM_NARRATIVE_TIMEOUT=120
      - DATABASE_URL=postgresql://aria:aria_secret@postgres:5432/aria_db
      - JWT_SECRET_KEY=change-this-in-production-use-a-long-random-string
      - ENVIRONMENT=development
      # Set to 0 only for local dev if you have no model pulled (backend starts without warm-up).
      - OLLAMA_STARTUP_REQUIRED=${OLLAMA_STARTUP_REQUIRED:-1}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./app/frontend
    container_name: resume-screener-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: resume-screener-nginx
    ports:
      - "80:80"
    volumes:
      - ./app/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  postgres_data:
