version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: resume-screener-postgres
    environment:
      POSTGRES_USER: aria
      POSTGRES_PASSWORD: aria_secret
      POSTGRES_DB: aria_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aria -d aria_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: resume-screener-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # On first run, exec into container and run: ollama pull llama3

  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    container_name: resume-screener-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=postgresql://aria:aria_secret@postgres:5432/aria_db
      - JWT_SECRET_KEY=change-this-in-production-use-a-long-random-string
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./app/frontend
    container_name: resume-screener-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: resume-screener-nginx
    ports:
      - "80:80"
    volumes:
      - ./app/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  postgres_data:
