name: CD - Build & Push Images

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run backend tests
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: pytest app/backend/tests/ -v

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: app/frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: app/frontend
      run: npm ci

    - name: Run frontend tests
      working-directory: app/frontend
      run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./app/backend/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/resume-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./app/frontend
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/resume-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

    - name: Build and push nginx
      uses: docker/build-push-action@v5
      with:
        context: ./nginx
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/resume-nginx:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

  # No deploy job needed — Watchtower on the VPS watches Docker Hub for new
  # :latest images and automatically pulls + restarts containers.
