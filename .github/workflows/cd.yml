name: CD - Build & Push Images

on:
  push:
    branches: [ main, production ]
  # Re-run build & push from GitHub → Actions → "CD - Build & Push Images" → Run workflow
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run backend tests
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: pytest app/backend/tests/ -v

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: app/frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: app/frontend
      run: npm ci

    - name: Run frontend tests
      working-directory: app/frontend
      run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set image tags based on branch
      id: tags
      run: |
        if [ "${{ github.ref_name }}" = "production" ]; then
          echo "BACKEND_TAG=${{ secrets.DOCKERHUB_USERNAME }}/resume-backend:latest" >> $GITHUB_OUTPUT
          echo "FRONTEND_TAG=${{ secrets.DOCKERHUB_USERNAME }}/resume-frontend:latest" >> $GITHUB_OUTPUT
          echo "NGINX_TAG=${{ secrets.DOCKERHUB_USERNAME }}/resume-nginx:latest" >> $GITHUB_OUTPUT
          echo "ENVIRONMENT=production" >> $GITHUB_OUTPUT
        else
          echo "BACKEND_TAG=${{ secrets.DOCKERHUB_USERNAME }}/resume-backend:staging" >> $GITHUB_OUTPUT
          echo "FRONTEND_TAG=${{ secrets.DOCKERHUB_USERNAME }}/resume-frontend:staging" >> $GITHUB_OUTPUT
          echo "NGINX_TAG=${{ secrets.DOCKERHUB_USERNAME }}/resume-nginx:staging" >> $GITHUB_OUTPUT
          echo "ENVIRONMENT=staging" >> $GITHUB_OUTPUT
        fi

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./app/backend/Dockerfile
        push: true
        tags: ${{ steps.tags.outputs.BACKEND_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./app/frontend
        push: true
        tags: ${{ steps.tags.outputs.FRONTEND_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

    - name: Build and push nginx
      uses: docker/build-push-action@v5
      with:
        context: ./nginx
        file: ./nginx/Dockerfile
        build-args: |
          NGINX_CONF=nginx.${{ steps.tags.outputs.ENVIRONMENT }}.conf
        push: true
        tags: ${{ steps.tags.outputs.NGINX_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

  # Deployment is handled by Watchtower on the VPS:
  # - Staging (main branch): Watchtower pulls :staging images → updates staging stack (docker-compose.prod.yml)
  # - Production (production branch): Watchtower pulls :latest images → updates production stack (docker-compose.production.yml)
  #
  # Watchtower automatically detects new images within 60 seconds and performs rolling restarts.
  # No manual SSH deployment required!
  #
  # SETUP INSTRUCTIONS:
  # 1. Deploy staging stack in Portainer using docker-compose.prod.yml
  # 2. Deploy production stack in Portainer using docker-compose.production.yml
  # 3. Each stack has its own Watchtower monitoring its containers
