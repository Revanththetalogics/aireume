name: CD - Deploy to VPS

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run backend tests
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: pytest app/backend/tests/ -v

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: app/frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: app/frontend
      run: npm ci

    - name: Run frontend tests
      working-directory: app/frontend
      run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./app/backend/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/resume-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./app/frontend
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/resume-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    - name: Trigger Portainer Webhook
      env:
        PORTAINER_WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK_URL }}
      run: |
        if [ -z "$PORTAINER_WEBHOOK" ]; then
          echo "PORTAINER_WEBHOOK_URL secret not set. Skipping auto-deploy."
          echo "Images pushed to Docker Hub. Manually redeploy in Portainer."
          exit 0
        fi
        
        echo "Triggering Portainer webhook..."
        curl -X POST "$PORTAINER_WEBHOOK" || echo "Webhook failed - may need manual deploy"
