name: CD - Build & Push Images

on:
  push:
    branches: [ main, production ]
  # Re-run build & push from GitHub → Actions → "CD - Build & Push Images" → Run workflow
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Determine image tag based on branch ───────────────────────────────
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
      environment: ${{ steps.tag.outputs.environment }}
    steps:
      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref_name }}" = "production" ]; then
            ENV="production"
          else
            ENV="staging"
          fi

          if [ "$ENV" = "production" ]; then
            echo "image_tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=staging" >> "$GITHUB_OUTPUT"
          fi

          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "Branch: ${{ github.ref_name }} → Environment: $ENV → Tag: $([ "$ENV" = "production" ] && echo "latest" || echo "staging")"

  # ─── Run tests ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app/backend/requirements.txt
        pip install pytest pytest-asyncio pytest-cov respx

    - name: Run backend tests
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: pytest app/backend/tests/ -v --ignore=app/backend/tests/test_agent_pipeline.py

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: app/frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: app/frontend
      run: npm ci

    - name: Run frontend tests
      working-directory: app/frontend
      run: npm test

  # ─── Build and push images ─────────────────────────────────────────────
  build-and-push:
    needs: [resolve-tag, test]
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
      DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./app/backend/Dockerfile
        push: true
        tags: ${{ env.DH_USER }}/resume-backend:${{ env.IMAGE_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./app/frontend
        push: true
        tags: ${{ env.DH_USER }}/resume-frontend:${{ env.IMAGE_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

    - name: Build and push nginx
      uses: docker/build-push-action@v5
      with:
        context: ./nginx
        push: true
        tags: ${{ env.DH_USER }}/resume-nginx:${{ env.IMAGE_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

    - name: Build and push livekit
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./app/voice_agent/Dockerfile.livekit
        push: true
        tags: ${{ env.DH_USER }}/resume-livekit:${{ env.IMAGE_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

    - name: Build and push speech-service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./app/speech_service/Dockerfile
        push: true
        tags: ${{ env.DH_USER }}/resume-speech-service:${{ env.IMAGE_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

    - name: Build and push voice-agent
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./app/voice_agent/Dockerfile
        push: true
        tags: ${{ env.DH_USER }}/resume-voice-agent:${{ env.IMAGE_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false

  # ─── Summary ────────────────────────────────────────────────────────────
  deploy-summary:
    needs: [resolve-tag, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Deployment summary
        run: |
          echo "=== Deployment Complete ==="
          echo "Environment: ${{ needs.resolve-tag.outputs.environment }}"
          echo "Image tag:   ${{ needs.resolve-tag.outputs.image_tag }}"
          echo ""
          echo "Watchtower on VPS will auto-pull updated images within ~60 seconds."
          echo "  - Staging stack:    docker-compose.staging.yml (tag: staging)"
          echo "  - Production stack: docker-compose.prod.yml    (tag: latest)"
