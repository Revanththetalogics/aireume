name: CD - Deploy to VPS

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run backend tests
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: pytest app/backend/tests/ -v

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: app/frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: app/frontend
      run: npm ci

    - name: Run frontend tests
      working-directory: app/frontend
      run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./app/backend/Dockerfile
        push: true
        tags: thetalogics/resume-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./app/frontend
        push: true
        tags: thetalogics/resume-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install SSH key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.VPS_SSH_KEY }}
        known_hosts: ${{ secrets.VPS_HOST }}

    - name: Deploy to VPS
      env:
        VPS_HOST: ${{ secrets.VPS_HOST }}
        VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
      run: |
        # Add host to known_hosts to avoid SSH prompt
        mkdir -p ~/.ssh
        ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts

        # Create app directory on VPS if it doesn't exist
        ssh $VPS_USERNAME@$VPS_HOST "mkdir -p /opt/resume-screener"

        # Copy docker-compose and nginx config to VPS
        scp docker-compose.prod.yml $VPS_USERNAME@$VPS_HOST:/opt/resume-screener/
        scp -r app/nginx/nginx.prod.conf $VPS_USERNAME@$VPS_HOST:/opt/resume-screener/nginx/

        # SSH into VPS and deploy
        ssh $VPS_USERNAME@$VPS_HOST << 'EOF'
          cd /opt/resume-screener

          # Pull latest images
          docker compose -f docker-compose.prod.yml pull

          # Start services
          docker compose -f docker-compose.prod.yml up -d

          # Clean up old images
          docker image prune -f

          # Check status
          docker compose -f docker-compose.prod.yml ps
        EOF
