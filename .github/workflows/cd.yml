name: CD - Deploy to VPS

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run backend tests
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: pytest app/backend/tests/ -v

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: app/frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: app/frontend
      run: npm ci

    - name: Run frontend tests
      working-directory: app/frontend
      run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./app/backend/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/resume-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./app/frontend
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/resume-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup SSH
      env:
        VPS_HOST: ${{ secrets.VPS_HOST }}
        VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      run: |
        mkdir -p ~/.ssh
        # Write key preserving newlines
        cat << 'PRIVATEKEY' > ~/.ssh/id_rsa
        $VPS_SSH_KEY
        PRIVATEKEY
        # Remove any Windows line endings and fix format
        sed -i 's/\r$//' ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        # Add host key
        ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

    - name: Deploy to VPS
      env:
        VPS_HOST: ${{ secrets.VPS_HOST }}
        VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
      run: |
        # Create app directory
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $VPS_USERNAME@$VPS_HOST "mkdir -p /opt/resume-screener"
        
        # Copy files
        scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa docker-compose.prod.yml $VPS_USERNAME@$VPS_HOST:/opt/resume-screener/
        scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -r app/nginx/nginx.prod.conf $VPS_USERNAME@$VPS_HOST:/opt/resume-screener/nginx/
        
        # Deploy
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $VPS_USERNAME@$VPS_HOST "cd /opt/resume-screener && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d"
