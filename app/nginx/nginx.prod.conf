events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name airesume-staging.thetalogics.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name airesume-staging.thetalogics.com;

        # SSL certificates (mounted from certbot)
        ssl_certificate /etc/letsencrypt/live/airesume-staging.thetalogics.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/airesume-staging.thetalogics.com/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Frontend
        location / {
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API (non-streaming)
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 180s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 180s;
        }

        # SSE streaming endpoint — separate block with buffering disabled.
        # proxy_buffering ON (default) holds SSE events in nginx's buffer instead of
        # forwarding them immediately, so Cloudflare never receives the heartbeat pings
        # and issues a 524. Disabling buffering flushes each event to the client at once.
        location /api/analyze/stream {
            limit_req zone=api burst=5 nodelay;

            proxy_pass http://backend:8000/api/analyze/stream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';

            # CRITICAL: disable buffering so SSE events are forwarded immediately.
            proxy_buffering off;
            proxy_cache off;
            # Tell Cloudflare and any upstream proxy not to buffer either.
            add_header X-Accel-Buffering no;

            # Allow the full LLM pipeline to complete (10 min safety cap).
            proxy_read_timeout 600s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 600s;

            # Required for SSE: chunked transfer, no gzip compression on stream.
            chunked_transfer_encoding on;
            gzip off;
        }

        # Health check
        location /health {
            proxy_pass http://backend:8000/health;
        }
    }
}
