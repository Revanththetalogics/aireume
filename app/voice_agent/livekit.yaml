# LiveKit Server configuration for ARIA Voice Screening
# Docs: https://docs.livekit.io/home/self-hosting/config/

port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 50200
  use_external_ip: false
  tcp_port: 7881

turn:
  enabled: true
  domain: ""
  tls_port: 0
  udp_port: 7882
  external_tls: false

keys:
  # Keys are injected at container start by livekit-entrypoint.sh from
  # LIVEKIT_API_KEY / LIVEKIT_API_SECRET — do not hardcode secrets here.
  placeholder: placeholder_minimum_32_characters_do_not_use

logging:
  level: info

redis:
  address: livekit-redis:6379

# SIP is configured programmatically via the LiveKit API (agent.py).
# Do NOT add sip: section to this YAML — the server version does not
# support sip.port or sip.trunks fields, causing a parse-error crash-loop.
