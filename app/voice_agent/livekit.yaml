# LiveKit Server configuration for ARIA Voice Screening
# Docs: https://docs.livekit.io/home/self-hosting/config/

port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 50200
  use_external_ip: false
  node_ip: 66.70.191.79
  tcp_port: 7881

turn:
  enabled: true
  domain: ""
  tls_port: 0
  udp_port: 7882
  external_tls: false

keys:
  staging_devkey: staging_devsecret
  devkey: devsecret

logging:
  level: info

redis:
  address: ""

# ─── SIP Trunking (Twilio Elastic SIP Trunk) ─────────────────────────────────
# Outbound PSTN calls via Twilio. The voice-agent creates SIP participants
# referencing trunk name "twilio-aria" which must match the trunk configured
# below (or created programmatically via LiveKit API on agent startup).
#
# If livekit-server fails to start with this config (exit code 1), comment
# out the sip: section and create the trunk via LiveKit API instead.
sip:
  trunks:
    - name: "twilio-aria"
      outbound_address: "sip.pstn.twilio.com"
      outbound_number: "+18722789563"
      auth_username: "aria-livekit"
      auth_password: "Itslogical1."
      allowed_addresses: []
  dispatch_rules:
    - name: "default-outbound"
      trunk_ids: []
      rule:
        rule_dispatch_direct: {}
