# LiveKit Server configuration for ARIA Voice Screening
# Docs: https://docs.livekit.io/home/self-hosting/config/

port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: true
  tcp_port: 7881

turn:
  enabled: true
  domain: ""  # Set to your domain in production
  tls_port: 0
  udp_port: 7882
  external_tls: false

keys:
  devkey: devsecret  # Override via LIVEKIT_API_KEY/LIVEKIT_API_SECRET env vars

logging:
  level: info

redis:
  address: ""  # Not required for single-node setup
