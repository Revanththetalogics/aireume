# LiveKit Server configuration for ARIA Voice Screening
# Docs: https://docs.livekit.io/home/self-hosting/config/

port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 50200
  use_external_ip: false
  node_ip: 66.70.191.79
  tcp_port: 7881

turn:
  enabled: true
  domain: ""
  tls_port: 0
  udp_port: 7882
  external_tls: false

keys:
  staging_devkey: staging_devsecret_min32chars_long_xyz
  devkey: devsecret_minimum_32_characters_long_abcdef

logging:
  level: info

redis:
  address: ""

# SIP trunking is configured programmatically via the LiveKit API
# in the voice-agent (see resolve_sip_trunk_id in agent.py).
# The livekit-server version does not support SIP config in YAML.
