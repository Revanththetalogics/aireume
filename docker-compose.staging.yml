# ─── STAGING ENVIRONMENT ───────────────────────────────────────────────────
# Separate stack from production. All container names, volumes, and networks
# are prefixed with "staging_" to avoid collisions with the production stack.
#
# Image tag: staging  (built from `main` branch by CD workflow)
# Portainer: deploy this as a separate stack named "aria-staging"
#
# NOTE: All healthchecks removed to allow stack deployment.
# Debug issues via `docker logs <container>` after deployment.
# ────────────────────────────────────────────────────────────────────────────
name: aria-staging

services:
  postgres:
    image: postgres:16-alpine
    container_name: staging-postgres
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=1GB
      -c work_mem=32MB
      -c maintenance_work_mem=128MB
      -c max_connections=100
    environment:
      POSTGRES_USER: ${STAGING_POSTGRES_USER:-aria_staging}
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD:?STAGING_POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${STAGING_POSTGRES_DB:-aria_staging_db}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: staging-ollama
    environment:
      - OLLAMA_NUM_THREAD=4
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - OLLAMA_KEEP_ALIVE=-1
    volumes:
      - staging_ollama_data:/root/.ollama
    # To pull models (run once):
    #   docker exec staging-ollama ollama pull qwen3.5:2b
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    restart: unless-stopped

  backend:
    image: revanth2245/resume-backend:staging
    pull_policy: always
    container_name: staging-backend
    command: uvicorn app.backend.main:app --host 0.0.0.0 --port 8000 --workers 1 --timeout-graceful-shutdown 30
    stop_grace_period: 30s
    environment:
      # Backend uses Ollama Cloud for enterprise quality
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-https://ollama.com}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:?OLLAMA_API_KEY is required}
      # Backend model (cloud - fast + quality)
      - OLLAMA_MODEL_BACKEND=${OLLAMA_MODEL_BACKEND:-gemini-3-flash-preview:cloud}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-${OLLAMA_MODEL_BACKEND:-gemini-3-flash-preview:cloud}}
      # Local model for JD profile extraction (disabled by default; cloud is faster)
      # Resume skills are extracted via Python (no LLM) for speed
      - OLLAMA_LOCAL_URL=${OLLAMA_LOCAL_URL:-http://ollama:11434}
      - OLLAMA_MODEL_SKILLS=${OLLAMA_MODEL_SKILLS:-qwen3.5:2b}
      - OLLAMA_USE_LOCAL_JD_PROFILE=${OLLAMA_USE_LOCAL_JD_PROFILE:-0}
      # Voice uses cloud Ollama for reliability
      - OLLAMA_BASE_URL_VOICE=${OLLAMA_BASE_URL:-https://ollama.com}
      - OLLAMA_MODEL_VOICE=${OLLAMA_MODEL_VOICE:-qwen3.5:cloud}
      - DATABASE_URL=postgresql://${STAGING_POSTGRES_USER:-aria_staging}:${STAGING_POSTGRES_PASSWORD}@postgres:5432/${STAGING_POSTGRES_DB:-aria_staging_db}
      - JWT_SECRET_KEY=${STAGING_JWT_SECRET_KEY:?STAGING_JWT_SECRET_KEY must be set}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-dev-internal-service-secret}
      - ENVIRONMENT=staging
      # 300s sufficient for qwen2.5:7b with reduced output
      - LLM_NARRATIVE_TIMEOUT=${LLM_NARRATIVE_TIMEOUT:-300}
      - OLLAMA_STARTUP_REQUIRED=${OLLAMA_STARTUP_REQUIRED:-1}
      - VOICE_AGENT_URL=http://voice-agent:8002
    depends_on:
      - postgres
      - ollama
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
    restart: unless-stopped

  frontend:
    image: revanth2245/resume-frontend:staging
    pull_policy: always
    container_name: staging-frontend
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  nginx:
    image: revanth2245/resume-nginx:staging
    pull_policy: always
    container_name: staging-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  ollama-warmup:
    image: ollama/ollama:latest
    container_name: staging-ollama-warmup
    depends_on:
      - ollama
    entrypoint: >
      /bin/sh -c "
        echo '=== Staging: Ollama Warmup ===';
        until ollama list > /dev/null 2>&1; do sleep 3; done;
        ollama run qwen3.5:2b 'warmup' --nowordwrap;
        echo 'Warmup complete';
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
    restart: "no"

  # Staging Watchtower — only watches staging containers
  watchtower:
    image: containrrr/watchtower
    container_name: staging-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      --rolling-restart
      --interval 60
      --cleanup
      staging-backend
      staging-frontend
      staging-nginx
      staging-speech-service
      staging-voice-agent
      staging-livekit
      staging-livekit-sip
    environment:
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_NO_PULL=false
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped

  # ─── Voice Screening Services (Staging) ──────────────────────────────────

  livekit-redis:
    image: redis:7-alpine
    container_name: staging-livekit-redis
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped

  livekit:
    image: revanth2245/resume-livekit:staging
    pull_policy: always
    container_name: staging-livekit
    command: >
      --config /etc/livekit.yaml
    environment:
      - LIVEKIT_API_KEY=${STAGING_LIVEKIT_API_KEY:-staging_devkey}
      - LIVEKIT_API_SECRET=${STAGING_LIVEKIT_API_SECRET:-staging_devsecret_min32chars_long_xyz}
      - LIVEKIT_NODE_IP=${STAGING_LIVEKIT_NODE_IP:-}
    ports:
      - "7890:7880"
      - "7891:7881"
      - "7892:7882/udp"
      - "50000-50200:50000-50200/udp"
    depends_on:
      - livekit-redis
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    restart: unless-stopped

  livekit-sip:
    image: livekit/sip:latest
    container_name: staging-livekit-sip
    environment:
      SIP_CONFIG_BODY: |
        api_key: ${STAGING_LIVEKIT_API_KEY:-staging_devkey}
        api_secret: ${STAGING_LIVEKIT_API_SECRET:-staging_devsecret_min32chars_long_xyz}
        ws_url: ws://livekit:7880
        redis:
          address: livekit-redis:6379
        sip_port: 5060
        rtp_port: 10000-10100
        use_external_ip: true
        node_ip: ${STAGING_LIVEKIT_NODE_IP:?STAGING_LIVEKIT_NODE_IP must be set to VPS public IP}
        logging:
          level: info
    ports:
      - "5060:5060"
      - "5060:5060/udp"
      - "10000-10100:10000-10100/udp"
    depends_on:
      - livekit
      - livekit-redis
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  speech-service:
    image: revanth2245/resume-speech-service:staging
    pull_policy: always
    container_name: staging-speech-service
    environment:
      - STT_ENGINE=${STT_ENGINE:-faster_whisper}
      - STT_MODEL=${STT_MODEL:-base}
      - STT_COMPUTE_TYPE=${STT_COMPUTE_TYPE:-int8}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
    restart: unless-stopped

  voice-agent:
    image: revanth2245/resume-voice-agent:staging
    pull_policy: always
    container_name: staging-voice-agent
    environment:
      - SPEECH_SERVICE_URL=http://speech-service:8001
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=${STAGING_LIVEKIT_API_KEY:-staging_devkey}
      - LIVEKIT_API_SECRET=${STAGING_LIVEKIT_API_SECRET:-staging_devsecret_min32chars_long_xyz}
      # Cloud Ollama for voice (reliable)
      - OLLAMA_BASE_URL_VOICE=${OLLAMA_BASE_URL:-https://ollama.com}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:?OLLAMA_API_KEY is required}
      - OLLAMA_MODEL_VOICE=${OLLAMA_MODEL_VOICE:-qwen3.5:cloud}
      - ARIA_BACKEND_URL=http://backend:8000
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-dev-internal-service-secret}
      - MAX_CONCURRENT_CALLS=${MAX_CONCURRENT_CALLS:-0}
      - SIP_TRUNK_ID=twilio-aria
      - SIP_OUTBOUND_NUMBER=+18722789563
      - SIP_TERMINATION_ADDRESS=aria-staging.pstn.twilio.com
      - SIP_AUTH_USERNAME=${SIP_AUTH_USERNAME:-aria-livekit}
      - SIP_AUTH_PASSWORD=${SIP_AUTH_PASSWORD:-Itslogical1.}
      - SIP_FROM_HOST=${SIP_FROM_HOST:-aria-staging.pstn.twilio.com}
      - SIP_TRANSPORT=${SIP_TRANSPORT:-SIP_TRANSPORT_TCP}
    depends_on:
      - livekit
      - speech-service
      - backend
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    restart: unless-stopped

volumes:
  staging_ollama_data:
  staging_postgres_data:

networks:
  default:
    name: aria_staging_network
    driver: bridge
