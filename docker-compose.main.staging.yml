# ─── STAGING — MAIN APP STACK (12 vCore / 48 GB VPS) ───────────────────────
# Backend, frontend, Postgres, and voice screening (LiveKit + speech + agent).
# Resume analysis uses Google Gemini (GEMINI_API_KEY).
#
# Portainer: deploy as stack "aria-staging-main"
# Required: GEMINI_API_KEY, STAGING_* secrets, STAGING_LIVEKIT_NODE_IP
# ────────────────────────────────────────────────────────────────────────────
name: aria-staging-main

services:
  postgres:
    image: postgres:16-alpine
    container_name: staging-postgres
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c work_mem=32MB
      -c maintenance_work_mem=128MB
      -c max_connections=100
    environment:
      POSTGRES_USER: ${STAGING_POSTGRES_USER:-aria_staging}
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD:?STAGING_POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${STAGING_POSTGRES_DB:-aria_staging_db}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    restart: unless-stopped

  backend:
    image: revanth2245/resume-backend:staging
    pull_policy: always
    container_name: staging-backend
    command: uvicorn app.backend.main:app --host 0.0.0.0 --port 8000 --workers 1 --timeout-graceful-shutdown 30
    stop_grace_period: 30s
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:?GEMINI_API_KEY must be set for staging main stack}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - OLLAMA_USE_LOCAL_JD_PROFILE=${OLLAMA_USE_LOCAL_JD_PROFILE:-0}
      - OLLAMA_STARTUP_REQUIRED=${OLLAMA_STARTUP_REQUIRED:-0}
      - LLM_NARRATIVE_TIMEOUT=${LLM_NARRATIVE_TIMEOUT:-120}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-https://ollama.com}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OLLAMA_MODEL_BACKEND=${OLLAMA_MODEL_BACKEND:-qwen2.5:3b}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemini-2.5-flash}
      - OLLAMA_BASE_URL_VOICE=${OLLAMA_BASE_URL_VOICE:-https://ollama.com}
      - OLLAMA_MODEL_VOICE=${OLLAMA_MODEL_VOICE:-qwen3.5:cloud}
      - OLLAMA_MAX_CONCURRENT=${OLLAMA_MAX_CONCURRENT:-4}
      - DATABASE_URL=postgresql://${STAGING_POSTGRES_USER:-aria_staging}:${STAGING_POSTGRES_PASSWORD}@postgres:5432/${STAGING_POSTGRES_DB:-aria_staging_db}
      - JWT_SECRET_KEY=${STAGING_JWT_SECRET_KEY:?STAGING_JWT_SECRET_KEY must be set}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET must be set}
      - ENVIRONMENT=staging
      - CORS_ORIGINS=${CORS_ORIGINS:-https://airesume-staging.thetalogics.com}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - BATCH_MAX_CONCURRENT=${BATCH_MAX_CONCURRENT:-15}
      - QUEUE_MAX_CONCURRENT=${QUEUE_MAX_CONCURRENT:-5}
      - VOICE_AGENT_URL=http://voice-agent:8002
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          cpus: '3'
          memory: 4G
    restart: unless-stopped

  frontend:
    image: revanth2245/resume-frontend:staging
    pull_policy: always
    container_name: staging-frontend
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  nginx:
    image: revanth2245/resume-nginx:staging
    pull_policy: always
    container_name: staging-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  # ─── Voice screening (colocated on main VPS) ─────────────────────────────

  livekit-redis:
    image: redis:7-alpine
    container_name: staging-livekit-redis
    command: redis-server --maxmemory 48mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 96M
    restart: unless-stopped

  livekit:
    image: revanth2245/resume-livekit:staging
    pull_policy: always
    container_name: staging-livekit
    command: >
      --config /etc/livekit.yaml
    environment:
      - LIVEKIT_API_KEY=${STAGING_LIVEKIT_API_KEY:?STAGING_LIVEKIT_API_KEY must be set}
      - LIVEKIT_API_SECRET=${STAGING_LIVEKIT_API_SECRET:?STAGING_LIVEKIT_API_SECRET must be set}
      - LIVEKIT_NODE_IP=${STAGING_LIVEKIT_NODE_IP:?STAGING_LIVEKIT_NODE_IP must be set to this VPS public IP}
    ports:
      - "7890:7880"
      - "7891:7881"
      - "7892:7882/udp"
      - "50000-50200:50000-50200/udp"
    depends_on:
      - livekit-redis
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M
    restart: unless-stopped

  livekit-sip:
    image: livekit/sip:latest
    container_name: staging-livekit-sip
    environment:
      SIP_CONFIG_BODY: |
        api_key: ${STAGING_LIVEKIT_API_KEY}
        api_secret: ${STAGING_LIVEKIT_API_SECRET}
        ws_url: ws://livekit:7880
        redis:
          address: livekit-redis:6379
        sip_port: 5060
        rtp_port: 10000-10100
        use_external_ip: true
        node_ip: ${STAGING_LIVEKIT_NODE_IP}
        logging:
          level: info
    ports:
      - "5060:5060"
      - "5060:5060/udp"
      - "10000-10100:10000-10100/udp"
    depends_on:
      - livekit
      - livekit-redis
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    restart: unless-stopped

  speech-service:
    image: revanth2245/resume-speech-service:staging
    pull_policy: always
    container_name: staging-speech-service
    environment:
      - STT_ENGINE=${STT_ENGINE:-faster_whisper}
      # small: better phone-call accuracy; needs ~8G limit (revert to base + 6G if OOM/latency issues)
      - STT_MODEL=${STT_MODEL:-small}
      - STT_COMPUTE_TYPE=${STT_COMPUTE_TYPE:-int8}
      - TTS_ALLOW_EDGE=false
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    restart: unless-stopped

  voice-agent:
    image: revanth2245/resume-voice-agent:staging
    pull_policy: always
    container_name: staging-voice-agent
    ports:
      - "8002:8002"
    environment:
      - SPEECH_SERVICE_URL=http://speech-service:8001
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=${STAGING_LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${STAGING_LIVEKIT_API_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL_VOICE=${GEMINI_MODEL_VOICE:-${GEMINI_MODEL:-gemini-2.5-flash}}
      - OLLAMA_BASE_URL_VOICE=${OLLAMA_BASE_URL_VOICE:-https://ollama.com}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OLLAMA_MODEL_VOICE=${OLLAMA_MODEL_VOICE:-qwen3.5:cloud}
      - ARIA_BACKEND_URL=http://backend:8000
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET must match main stack}
      - MAX_CONCURRENT_CALLS=${MAX_CONCURRENT_CALLS:-2}
      - VAD_SILENCE_MS=${VAD_SILENCE_MS:-600}
      - SIP_TRUNK_ID=${SIP_TRUNK_ID:-twilio-aria}
      - SIP_OUTBOUND_NUMBER=${SIP_OUTBOUND_NUMBER:-+18722789563}
      - SIP_TERMINATION_ADDRESS=${SIP_TERMINATION_ADDRESS:-aria-staging.pstn.twilio.com}
      - SIP_AUTH_USERNAME=${SIP_AUTH_USERNAME:-aria-livekit}
      - SIP_AUTH_PASSWORD=${SIP_AUTH_PASSWORD:?SIP_AUTH_PASSWORD must be set}
      - SIP_FROM_HOST=${SIP_FROM_HOST:-aria-staging.pstn.twilio.com}
      - SIP_TRANSPORT=${SIP_TRANSPORT:-SIP_TRANSPORT_TCP}
    depends_on:
      - livekit
      - speech-service
      - backend
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    container_name: staging-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      --rolling-restart
      --interval 60
      --cleanup
      staging-backend
      staging-frontend
      staging-nginx
      staging-speech-service
      staging-voice-agent
      staging-livekit
      staging-livekit-sip
    environment:
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_NO_PULL=false
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped

volumes:
  staging_postgres_data:

networks:
  default:
    name: aria_staging_main_network
    driver: bridge
