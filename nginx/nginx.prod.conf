events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Allow large file uploads globally (batch processing: 50 resumes × 10MB each)
    client_max_body_size 500M;

    # Docker embedded DNS (see https://docs.docker.com/network/#dns-services)
    # Re-resolve backend / frontend hostnames every 30s. Without this, nginx
    # caches the container IP at startup; after `docker compose up` recreates
    # the backend, the old IP is unreachable → "113 Host is unreachable" / 502.
    # resolver_timeout: gracefully handle DNS query timeouts (default is 30s which is too long)
    # valid=5s: cache DNS results for 5s to pick up container IP changes quickly after recreation
    # ipv6=off: disable IPv6 lookups since Docker bridge network uses IPv4 only
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ─── Rate Limiting ───────────────────────────────────────────────────────────
    # Define rate limit zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;

    # Define connection limit zones
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    server {
        listen 80;
        server_name airesume-staging.thetalogics.com;

        # ─── Security headers (applied to all responses) ───────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https: wss:; media-src 'self' blob:; frame-src 'self' blob:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

        # Block crawlers from sensitive routes
        location = /robots.txt {
            add_header Content-Type text/plain;
            return 200 "User-agent: *\nDisallow: /admin\nDisallow: /api\nDisallow: /docs\nDisallow: /redoc\nDisallow: /metrics\n";
        }

        # Health — variable proxy_pass forces runtime DNS lookup
        location = /health {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream$request_uri;
            proxy_set_header Host $host;
        }

        # SSE streaming — same dynamic upstream as /api/
        location /api/analyze/stream {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream$request_uri;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
            proxy_http_version 1.1;
            proxy_read_timeout 300s;
            proxy_buffering    off;
            proxy_cache        off;
            gzip               off;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            add_header         X-Accel-Buffering  "no" always;
            add_header         Alt-Svc            "clear" always;
        }

        location /api/analyze/batch-stream {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream$request_uri;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
            proxy_http_version 1.1;
            proxy_read_timeout 600s;
            proxy_buffering    off;
            proxy_cache        off;
            gzip               off;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            add_header         X-Accel-Buffering  "no" always;
            add_header         Alt-Svc            "clear" always;
        }

        # All other API routes
        location /api/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream$request_uri;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
            proxy_cookie_path / /;
            proxy_http_version 1.1;
            proxy_connect_timeout 15s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;

            # Rate limiting - 60 requests per second
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 20;

            # Allow large file uploads for batch processing (50 resumes × 10MB each)
            client_max_body_size 500M;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # NOTE: CORS (including OPTIONS preflight) is handled by the FastAPI
            # CORSMiddleware using the CORS_ORIGINS allow-list. Do NOT add a
            # wildcard Access-Control-Allow-Origin here — it would bypass that
            # allow-list for preflight requests.
        }

        # Prometheus metrics — restrict to internal/monitoring networks only.
        # Adjust the allowed CIDRs to match your Docker/monitoring subnet.
        location = /metrics {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Auth endpoints - stricter rate limiting
        location /api/auth/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream$request_uri;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
            proxy_cookie_path / /;
            proxy_http_version 1.1;

            # Stricter rate limiting - 10 requests per second
            limit_req zone=auth_limit burst=10 nodelay;
            limit_conn conn_limit 5;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Upload endpoints - most restrictive
        location /api/upload/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream$request_uri;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
            proxy_cookie_path / /;
            proxy_http_version 1.1;
            proxy_read_timeout    600s;
            client_max_body_size 500M;

            # Most restrictive - 5 requests per second
            limit_req zone=upload_limit burst=5 nodelay;
            limit_conn conn_limit 3;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Build id — never cache (deploy refresh detection)
        location = /api/version {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream$request_uri;
            proxy_set_header Host $host;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        # Hashed frontend assets — long cache at edge
        location /assets/ {
            set $frontend_upstream http://frontend:8080;
            proxy_pass $frontend_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # SPA shell — never cache
        location = /index.html {
            set $frontend_upstream http://frontend:8080;
            proxy_pass $frontend_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # Frontend SPA
        location / {
            set $frontend_upstream http://frontend:8080;
            proxy_pass $frontend_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }

        # LiveKit WebSocket — required for voice screening real-time audio
        location /livekit {
            set $livekit_upstream http://livekit:7880;
            proxy_pass $livekit_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
