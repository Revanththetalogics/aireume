events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Allow large file uploads globally (batch processing: 50 resumes × 10MB each)
    client_max_body_size 500M;

    # Docker embedded DNS resolver - CRITICAL for dynamic hostname resolution
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # HTTP server (Cloudflare handles SSL termination)
    server {
        listen 80;
        server_name airesume-staging.thetalogics.com;

        # Security Headers (Cloudflare adds HSTS)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Frontend SPA
        location / {
            proxy_pass http://frontend:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API (non-streaming)
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 180s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 180s;

            # Allow large file uploads for batch processing (50 resumes × 10MB each)
            client_max_body_size 500M;
        }

        # SSE streaming endpoint — separate block with buffering disabled
        location /api/analyze/stream {
            limit_req zone=api burst=5 nodelay;

            proxy_pass http://backend:8000/api/analyze/stream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';

            # CRITICAL: disable buffering so SSE events are forwarded immediately
            proxy_buffering off;
            proxy_cache off;
            add_header X-Accel-Buffering no;

            # Allow the full LLM pipeline to complete (10 min safety cap)
            proxy_read_timeout 600s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 600s;

            # Required for SSE: chunked transfer, no gzip compression on stream
            chunked_transfer_encoding on;
            gzip off;
        }

        # Health check
        location /health {
            proxy_pass http://backend:8000/health;
        }
    }
}
