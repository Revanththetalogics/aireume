events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    keepalive_timeout 65;
    # gzip is enabled for normal responses but explicitly disabled for SSE
    # (gzip buffers chunks, which kills heartbeat pings)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Upstream definitions — add more backend/frontend instances here for load balancing
    upstream backend {
        server backend:8000;
        # scale: add more here e.g. server backend_2:8000;
    }

    upstream frontend {
        server frontend:80;
        # scale: add more here e.g. server frontend_2:80;
    }

    server {
        listen 80;
        server_name airesume-staging.thetalogics.com;

        # Health check endpoint (bypass to backend)
        location /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
        }

        # ── SSE streaming endpoint ────────────────────────────────────────────
        # Separate block with tight SSE settings:
        #   - proxy_buffering off  → pings reach the browser immediately
        #   - gzip off             → no chunked-compression buffering
        #   - proxy_read_timeout 300s → LLM can take up to 5 min (150s timeout
        #                              + headroom for queue wait)
        #   - Alt-Svc: clear       → tells Chrome/Edge to NOT use QUIC/HTTP3
        #                            for this endpoint; ERR_QUIC_PROTOCOL_ERROR
        #                            is caused by Cloudflare cutting QUIC streams
        #                            at ~100s even when data is flowing
        location /api/analyze/stream {
            proxy_pass         http://backend/api/analyze/stream;
            proxy_http_version 1.1;
            proxy_read_timeout 300s;
            proxy_buffering    off;
            proxy_cache        off;
            gzip               off;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            # Suppress X-Accel-Buffering so upstream can't accidentally re-enable it
            add_header         X-Accel-Buffering  "no" always;
            # Force browser off QUIC for this long-lived stream endpoint
            add_header         Alt-Svc            "clear" always;
        }

        # ── All other API routes ──────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend/api/;
            proxy_http_version 1.1;
            # If backend is down/restarting, fail fast instead of hanging (avoids opaque 504s)
            proxy_connect_timeout 15s;
            proxy_send_timeout    300s;
            # 300s covers worst-case LLM response on a CPU-only VPS
            proxy_read_timeout 300s;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # CORS preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  *;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type, Authorization";
                return 204;
            }
        }

        # Frontend — serve React app, fallback to index.html for SPA routing
        location / {
            proxy_pass         http://frontend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }
    }
}
