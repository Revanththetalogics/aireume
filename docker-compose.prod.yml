version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: resume-screener-ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  backend:
    image: revanth2245/resume-backend:latest
    container_name: resume-screener-backend
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=/data/resume_screener.db
      - ENVIRONMENT=production
    volumes:
      - sqlite_data:/data
    ports:
      - "8001:8000"   # Exposed on 8001 so system nginx can reach it without conflicting with ai-factory-backend on 8000
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s   # Give uvicorn time to boot before first check

  frontend:
    image: revanth2245/resume-frontend:latest
    container_name: resume-screener-frontend
    depends_on:
      - backend
    restart: unless-stopped
    # No host port — nginx below handles all external traffic

  nginx:
    image: nginx:alpine
    container_name: resume-screener-nginx
    ports:
      - "8080:80"   # System nginx proxies airesume-staging.thetalogics.com → localhost:8080
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    command: |
      sh -c 'echo "events { worker_connections 1024; }
      http {
        include /etc/nginx/mime.types;
        server {
          listen 80;
          server_name airesume-staging.thetalogics.com;
          location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_read_timeout 120s;
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
          }
          location /health {
            proxy_pass http://backend:8000/health;
          }
          location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
          }
        }
      }" > /etc/nginx/nginx.conf && nginx -g "daemon off;"'

  certbot:
    image: certbot/certbot
    container_name: resume-screener-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"
    restart: unless-stopped

volumes:
  ollama_data:
  sqlite_data:
  certbot_certs:
  certbot_www:
