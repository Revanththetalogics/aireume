version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: resume-screener-ollama
    volumes:
      - ollama_data:/root/.ollama
    # Ollama port not exposed publicly - only accessible via backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  backend:
    image: thetalogics/resume-backend:latest
    container_name: resume-screener-backend
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=/data/resume_screener.db
      - ENVIRONMENT=production
    volumes:
      - sqlite_data:/data
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: thetalogics/resume-frontend:latest
    container_name: resume-screener-frontend
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: resume-screener-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # Certbot for SSL certificate renewal
  certbot:
    image: certbot/certbot
    container_name: resume-screener-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"
    restart: unless-stopped

volumes:
  ollama_data:
  sqlite_data:
  certbot_certs:
  certbot_www:
