version: '3.8'

# Project name scopes all containers to "aria" — safe to run alongside other stacks on the same VPS.
# All container names, networks, and volumes are prefixed with "aria_".
name: aria

services:
  postgres:
    image: postgres:16-alpine
    container_name: resume-screener-postgres
    # Tuned for 6 GB RAM allocation on a 48 GB server.
    command: >
      postgres
      -c shared_buffers=1536MB
      -c effective_cache_size=4GB
      -c work_mem=64MB
      -c maintenance_work_mem=256MB
      -c max_connections=200
      -c wal_buffers=64MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-aria_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 6G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aria} -d ${POSTGRES_DB:-aria_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: resume-screener-ollama
    environment:
      # CPU inference: use all 8 allocated cores for maximum token throughput.
      - OLLAMA_NUM_THREAD=8
      # Allow 4 concurrent LLM requests — 3-stage pipeline fires up to 2 nodes
      # simultaneously; the extra slot handles SSE streaming overlap.
      - OLLAMA_NUM_PARALLEL=4
      # Only one model now — no need to keep multiple slots hot.
      - OLLAMA_MAX_LOADED_MODELS=1
      # Flash Attention: fused attention kernel, 20-40% faster on longer contexts.
      - OLLAMA_FLASH_ATTENTION=1
      # Quantise KV cache to int8 — halves RAM per-slot, allows higher parallelism.
      - OLLAMA_KV_CACHE_TYPE=q8_0
      # Keep model always hot in RAM (-1 = never unload)
      - OLLAMA_KEEP_ALIVE=-1
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: '8'
          # gemma4:e4b weights: 9.6 GB + 1.8 GB KV-cache + 0.5 GB overhead = ~12 GB.
          # 14 GB gives comfortable headroom for concurrent requests.
          memory: 14G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Rebuild/push the backend image from app/backend/Dockerfile so ENTRYPOINT includes
  # wait_for_ollama.py (Ollama healthy + model warm before uvicorn).
  backend:
    image: revanth2245/resume-backend:latest
    container_name: resume-screener-backend
    # 4 workers: backend is I/O-bound (waits on Ollama/DB), so multiple workers
    # serve concurrent users without starving Ollama of CPU cores.
    command: uvicorn app.backend.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DATABASE_URL=postgresql://${POSTGRES_USER:-aria}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aria_db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
      - ENVIRONMENT=production
      # gemma4:e4b — 4B edge model (9.6 GB), 128K context, multimodal.
      # Used for both parsing helpers and the narrative LLM call.
      # Generates the narrative JSON in ~10-20s on CPU vs ~60s for 26b,
      # and fits entirely within the reduced 14 GB Ollama memory limit.
      - OLLAMA_FAST_MODEL=gemma4:e4b
      - OLLAMA_MODEL=gemma4:e4b
      # Cold load / CPU contention can exceed 60s; 150s matches app default and reduces false "LLM offline".
      - LLM_NARRATIVE_TIMEOUT=150
      # Backend entrypoint waits for Ollama + pulls model into RAM before uvicorn.
      - OLLAMA_STARTUP_REQUIRED=1
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '3'
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    image: revanth2245/resume-frontend:latest
    container_name: resume-screener-frontend
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  nginx:
    image: revanth2245/resume-nginx:latest
    container_name: resume-screener-nginx
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Runs once after Ollama is healthy, loads both models into RAM so the
  # first real analysis request is never blocked by a cold-start.
  # Then enters a keep-alive loop to ensure the model stays loaded.
  ollama-warmup:
    image: ollama/ollama:latest
    container_name: resume-screener-ollama-warmup
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        echo '============================================';
        echo '  ARIA — Ollama Model Warmup & Keep-Alive';
        echo '============================================';
        echo '';
        echo '  Waiting for Ollama...';
        until ollama list > /dev/null 2>&1; do
          echo '  Waiting for Ollama...';
          sleep 3;
        done;
        echo '  ✓  Ollama is up';
        echo '';
        echo '  Loading gemma4:e4b into RAM...';
        ollama run gemma4:e4b 'warmup' --nowordwrap;
        echo '  ✓  gemma4:e4b is HOT in RAM';
        echo '  ✓  Warmup complete — entering keep-alive loop';
        echo '============================================';
        while true; do
          sleep 240;
          ollama run gemma4:e4b 'ping' --nowordwrap > /dev/null 2>&1 || echo '[keepalive] ping failed, will retry';
        done
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
    restart: unless-stopped

  # Watchtower: polls Docker Hub every 60s and auto-restarts any container
  # whose image has been updated. This is the deployment mechanism — every
  # git push that passes CI/CD builds a new :latest image, and Watchtower
  # picks it up within a minute without any manual SSH intervention.
  # Monitors only ARIA containers (label filter) so it doesn't touch other
  # stacks running on the same VPS.
  watchtower:
    image: containrrr/watchtower
    container_name: resume-screener-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      --interval 60
      --cleanup
      resume-screener-backend
      resume-screener-frontend
      resume-screener-nginx
    environment:
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_NO_PULL=false
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: resume-screener-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"
    restart: unless-stopped

volumes:
  ollama_data:
  postgres_data:
  certbot_certs:
  certbot_www:
