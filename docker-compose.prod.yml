version: '3.8'

# Project name scopes all containers to "aria" — safe to run alongside other stacks on the same VPS.
# All container names, networks, and volumes are prefixed with "aria_".
name: aria

services:
  postgres:
    image: postgres:16-alpine
    container_name: resume-screener-postgres
    # Tuned for 6 GB RAM allocation on a 48 GB server.
    command: >
      postgres
      -c shared_buffers=1536MB
      -c effective_cache_size=4GB
      -c work_mem=64MB
      -c maintenance_work_mem=256MB
      -c max_connections=200
      -c wal_buffers=64MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-aria_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 6G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aria} -d ${POSTGRES_DB:-aria_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: resume-screener-ollama
    environment:
      # CPU inference: use all 8 allocated cores for maximum token throughput.
      - OLLAMA_NUM_THREAD=8
      # Allow 4 concurrent LLM requests — 3-stage pipeline fires up to 2 nodes
      # simultaneously; the extra slot handles SSE streaming overlap.
      - OLLAMA_NUM_PARALLEL=4
      # Only one model now — no need to keep multiple slots hot.
      - OLLAMA_MAX_LOADED_MODELS=1
      # Flash Attention: fused attention kernel, 20-40% faster on longer contexts.
      - OLLAMA_FLASH_ATTENTION=1
      # Quantise KV cache to int8 — halves RAM per-slot, allows higher parallelism.
      - OLLAMA_KV_CACHE_TYPE=q8_0
      # Keep model always hot in RAM (-1 = never unload)
      - OLLAMA_KEEP_ALIVE=-1
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: '8'
          # Model memory estimate: weights + KV-cache + compute headroom
          # 8 GB gives headroom for OS overhead and concurrent requests.
          memory: 8G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Rebuild/push the backend image from app/backend/Dockerfile so ENTRYPOINT includes
  # wait_for_ollama.py (Ollama healthy + model warm before uvicorn).
  backend:
    image: revanth2245/resume-backend:latest
    container_name: resume-screener-backend
    # 4 workers: backend is I/O-bound (waits on Ollama/DB), so multiple workers
    # serve concurrent users without starving Ollama of CPU cores.
    command: uvicorn app.backend.main:app --host 0.0.0.0 --port 8000 --workers 6 --timeout-graceful-shutdown 30
    # Give the backend time to finish background tasks (sentinel) on shutdown
    stop_grace_period: 60s
    environment:
      # Ollama Cloud (default): https://ollama.com — get API key from https://ollama.com/settings/keys
      # For local Ollama, set OLLAMA_BASE_URL=http://ollama:11434 in your .env file
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-https://ollama.com}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:?OLLAMA_API_KEY is required. Get it from https://ollama.com/settings/keys}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-aria}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aria_db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}
      - ENVIRONMENT=production
      # Using gemma4:31b-cloud - powerful multimodal model with strong reasoning
      # Excellent for video malpractice detection, resume analysis, and transcript evaluation
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:31b-cloud}
      # 500s recommended for gemma4:31b-cloud (faster than 480B models)
      - LLM_NARRATIVE_TIMEOUT=${LLM_NARRATIVE_TIMEOUT:-500}
      # Backend entrypoint waits for Ollama + pulls model into RAM before uvicorn.
      # Automatically skipped when using Ollama Cloud.
      - OLLAMA_STARTUP_REQUIRED=${OLLAMA_STARTUP_REQUIRED:-1}
    depends_on:
      postgres:
        condition: service_healthy
      # Remove this depends_on when using Ollama Cloud only
      ollama:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    image: revanth2245/resume-frontend:latest
    container_name: resume-screener-frontend
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped

  nginx:
    image: revanth2245/resume-nginx:latest
    container_name: resume-screener-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    # Graceful shutdown for zero-downtime deployment
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Runs once after Ollama is healthy, loads model into RAM so the
  # first real analysis request is never blocked by a cold-start.
  # Exits after warmup — OLLAMA_KEEP_ALIVE=-1 on ollama container keeps model loaded.
  ollama-warmup:
    image: ollama/ollama:latest
    container_name: resume-screener-ollama-warmup
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        echo '============================================';
        echo '  ARIA — Ollama Model Warmup';
        echo '============================================';
        echo '';
        echo '  Waiting for Ollama...';
        until ollama list > /dev/null 2>&1; do
          echo '  Waiting for Ollama...';
          sleep 3;
        done;
        echo '  ✓  Ollama is up';
        echo '';
        echo '  Loading gemma4:31b into RAM...';
        ollama run gemma4:31b 'warmup' --nowordwrap;
        echo '  ✓  gemma4:31b is HOT in RAM';
        echo '  ✓  Warmup complete — exiting (KEEP_ALIVE=-1 keeps model loaded)';
        echo '============================================';
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
    restart: "no"

  # Watchtower: polls Docker Hub every 60s and auto-restarts any container
  # whose image has been updated. This is the deployment mechanism — every
  # git push that passes CI/CD builds a new :latest image, and Watchtower
  # picks it up within a minute without any manual SSH intervention.
  # Monitors only ARIA containers (label filter) so it doesn't touch other
  # stacks running on the same VPS.
  watchtower:
    image: containrrr/watchtower
    container_name: resume-screener-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      --rolling-restart
      --interval 60
      --cleanup
      resume-screener-backend
      resume-screener-frontend
      resume-screener-nginx
    environment:
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_NO_PULL=false
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: resume-screener-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"
    restart: unless-stopped

volumes:
  ollama_data:
  postgres_data:
  certbot_certs:
  certbot_www:

networks:
  default:
    name: aria_network
    driver: bridge
